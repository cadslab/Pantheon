<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pantheon - Automated Research</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; margin: 20px; }
        table { margin: 20px auto; border-collapse: collapse; width: 90%; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        th { background: #f5f5f5; cursor: pointer; user-select: none; }
        th:hover { background: #eee; }
        .poem { margin: 30px 0; line-height: 1.8; font-style: italic; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
// ====================== 项目配置 ======================
const platformData = [
  "EvoScientist/EvoScientist",
  "tsingyuai/scientify",
  "wentorai/Research-Claw",
  "ymx10086/ResearchClaw",
  "wanshuiyin/Auto-claude-code-research-in-sleep",
  "OpenLAIR/dr-claw",
  "aiming-lab/AutoResearchClaw",
  "InternScience/DrClaw",
  "snap-stanford/Biomni",
  "ur-whitelab/chemcrow-public",
  "shawnleeai/ScholarForge",
  "Prismer-AI/Prismer",
  "ZhihaoAIRobotic/ClawPhD",
  "langchain-ai/local-deep-researcher",
  "zjowowen/InnoClaw"
];

const skillData = [
  "Leey21/awesome-ai-research-writing",
  "Lylll9436/Paper-Polish-Workflow-skill",
  "lulaiao/DoctorClaw"
];

// ====================== 获取 GitHub 实时数据 ======================
async function fetchRepoData(repoPath) {
  try {
    const res = await fetch(`https://api.github.com/repos/${repoPath}`);
    const data = await res.json();
    const commitRes = await fetch(`https://api.github.com/repos/${repoPath}/commits?per_page=1`);
    const commits = await commitRes.json();
    return {
      name: repoPath.split('/')[1],
      url: `https://github.com/${repoPath}`,
      stars: data.stargazers_count || 0,
      forks: data.forks_count || 0,
      issues: data.open_issues_count || 0,
      contributors: 0,
      lastCommit: commits[0]?.commit?.committer?.date || ''
    };
  } catch (e) {
    return { name: repoPath, url: '#', stars:0, forks:0, issues:0, lastCommit:'' };
  }
}

// ====================== 渲染表格 ======================
function renderTable(id, title, data) {
  let html = `<h2>${title}</h2><table id="${id}"><thead><tr>
    <th>Project</th>
    <th data-type="num">⭐ Stars</th>
    <th data-type="num">🍴 Forks</th>
    <th data-type="num">🐛 Issues</th>
    <th data-type="date">🕒 Last Commit</th>
  </tr></thead><tbody>`;

  data.forEach(item => {
    html += `<tr>
      <td><a href="${item.url}" target="_blank">${item.name}</a></td>
      <td data-sort="${item.stars}">${item.stars}</td>
      <td data-sort="${item.forks}">${item.forks}</td>
      <td data-sort="${item.issues}">${item.issues}</td>
      <td data-sort="${new Date(item.lastCommit).getTime()}">${new Date(item.lastCommit).toLocaleDateString()}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

// ====================== 排序函数 ======================
function bindSort(tableId) {
  const table = document.getElementById(tableId);
  const headers = table.querySelectorAll("th");
  headers.forEach((th, idx) => {
    let order = 1;
    th.onclick = () => {
      const rows = Array.from(table.querySelectorAll("tbody tr"));
      rows.sort((a, b) => {
        const aVal = a.cells[idx].dataset.sort;
        const bVal = b.cells[idx].dataset.sort;
        return (aVal - bVal) * order;
      });
      rows.forEach(row => table.tbodies[0].appendChild(row));
      order *= -1;
    };
  });
}

// ====================== 启动 ======================
async function init() {
  const app = document.getElementById("app");
  app.innerHTML = "<h2>Loading GitHub data...</h2>";
  
  const platforms = await Promise.all(platformData.map(fetchRepoData));
  const skills = await Promise.all(skillData.map(fetchRepoData));

  app.innerHTML = `
    <h1>Pantheon - Automated Research</h1>
    <div class="poem">
      When chaos first gave way to hidden truths profound,<br>
      Mortal seekers wandered lost, with no clear way bound.
    </div>
    ${renderTable("platforms", "Platform Dashboard", platforms)}
    ${renderTable("skills", "Skill Dashboard", skills)}
  `;

  bindSort("platforms");
  bindSort("skills");
}

window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pantheon - Automated Research</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; margin: 20px; }
        table { margin: 20px auto; border-collapse: collapse; width: 90%; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        th { background: #f5f5f5; cursor: pointer; user-select: none; }
        th:hover { background: #eee; }
        .poem { margin: 30px 0; line-height: 1.8; font-style: italic; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
// ====================== 仓库列表 ======================
const platformRepos = [
  "EvoScientist/EvoScientist",
  "tsingyuai/scientify",
  "wentorai/Research-Claw",
  "ymx10086/ResearchClaw",
  "wanshuiyin/Auto-claude-code-research-in-sleep",
  "OpenLAIR/dr-claw",
  "aiming-lab/AutoResearchClaw",
  "InternScience/DrClaw",
  "snap-stanford/Biomni",
  "ur-whitelab/chemcrow-public",
  "shawnleeai/ScholarForge",
  "Prismer-AI/Prismer",
  "ZhihaoAIRobotic/ClawPhD",
  "langchain-ai/local-deep-researcher",
  "zjowowen/InnoClaw"
];

const skillRepos = [
  "Leey21/awesome-ai-research-writing",
  "Lylll9436/Paper-Polish-Workflow-skill",
  "lulaiao/DoctorClaw"
];

// 全局数据
let platformData = [];
let skillData = [];
let sortAsc = true;

// ====================== 获取 GitHub 实时数据 ======================
async function fetchRepo(repo) {
  try {
    const res = await fetch(`https://api.github.com/repos/${repo}`);
    const data = await res.json();
    const commitRes = await fetch(`https://api.github.com/repos/${repo}/commits?per_page=1`);
    const commits = await commitRes.json();
    return {
      name: repo.split('/')[1],
      url: `https://github.com/${repo}`,
      stars: data.stargazers_count || 0,
      forks: data.forks_count || 0,
      issues: data.open_issues_count || 0,
      contributors: 0,
      lastCommit: commits[0]?.commit?.committer?.date || "1970-01-01"
    };
  } catch (e) {
    return { name: repo, url: "#", stars: 0, forks: 0, issues: 0, lastCommit: "1970-01-01" };
  }
}

// ====================== 渲染表格 ======================
function renderTable(id, title, data, sortFunc) {
  return `
    <h2>${title}</h2>
    <table id="${id}">
      <thead>
        <tr>
          <th onclick="${sortFunc}('name')">Project</th>
          <th onclick="${sortFunc}('stars')">⭐ Stars</th>
          <th onclick="${sortFunc}('forks')">🍴 Forks</th>
          <th onclick="${sortFunc}('issues')">🐛 Issues</th>
          <th onclick="${sortFunc}('lastCommit')">🕒 Last Commit</th>
        </tr>
      </thead>
      <tbody>
        ${data.map(item => `
          <tr>
            <td><a href="${item.url}" target="_blank">${item.name}</a></td>
            <td>${item.stars}</td>
            <td>${item.forks}</td>
            <td>${item.issues}</td>
            <td>${new Date(item.lastCommit).toLocaleDateString()}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ====================== 排序：完全按你给的方法 ======================
function sortPlatform(key) {
  platformData.sort((a, b) => {
    if (key === "name") return a.name.localeCompare(b.name) * (sortAsc ? 1 : -1);
    if (key === "lastCommit") return (new Date(a.lastCommit) - new Date(b.lastCommit)) * (sortAsc ? 1 : -1);
    return (a[key] - b[key]) * (sortAsc ? 1 : -1);
  });
  sortAsc = !sortAsc;
  renderAll();
}

function sortSkill(key) {
  skillData.sort((a, b) => {
    if (key === "name") return a.name.localeCompare(b.name) * (sortAsc ? 1 : -1);
    if (key === "lastCommit") return (new Date(a.lastCommit) - new Date(b.lastCommit)) * (sortAsc ? 1 : -1);
    return (a[key] - b[key]) * (sortAsc ? 1 : -1);
  });
  sortAsc = !sortAsc;
  renderAll();
}

// ====================== 渲染页面 ======================
async function renderAll() {
  if (platformData.length === 0) {
    platformData = await Promise.all(platformRepos.map(fetchRepo));
  }
  if (skillData.length === 0) {
    skillData = await Promise.all(skillRepos.map(fetchRepo));
  }

  document.getElementById("app").innerHTML = `
    <h1>Pantheon - Automated Research</h1>
    <div class="poem">
      When chaos first gave way to hidden truths profound,<br>
      Mortal seekers wandered lost, with no clear way bound.<br>
      No need to toil through volumes thousand-fold,<br>
      For wit unbodied breaks the darkness cold.<br><br>
      Trials of experiment, strokes of fate—<br>
      Too often spent their years in endless season.<br><br>
      Now a new path dawns: a bodiless mind,<br>
      Without form or voice, yet with logic refined.<br>
      It reads, it knows, it reasons, it reveals,<br>
      Crossing every barrier truth conceals.<br><br>
      May this art guide all who wander far,<br>
      To find the light, and reach the shining star.
    </div>
    ${renderTable("platformTable", "Platform Dashboard", platformData, "sortPlatform")}
    ${renderTable("skillTable", "Skill Dashboard", skillData, "sortSkill")}
    <br>
    <h3>License</h3>
    <p>MIT License</p>
  `;
}

window.onload = renderAll;
</script>
</body>
</html>

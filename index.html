<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantheon - Automated Research</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        min-height: 100vh;
        padding: 40px 20px;
        color: #1e293b;
        line-height: 1.6;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .loading {
        text-align: center;
        padding: 60px 20px;
        font-size: 20px;
        color: #475569;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
        padding: 50px 30px;
        background: white;
        border-radius: 24px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.8);
      }

      .hero h1 {
        font-size: 52px;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }

      .hero h2 {
        font-size: 24px;
        color: #475569;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .hero h3 {
        font-size: 26px;
        color: #64748b;
        font-weight: 400;
        margin-bottom: 30px;
      }

      .stats-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 36px;
        margin-top: 24px;
        flex-wrap: wrap;
      }

      .stat-item {
        font-size: 18px;
        font-weight: 600;
        color: #334155;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        background: #f1f5f9;
        border-radius: 12px;
        height: 48px;
      }

      .stat-item span {
        font-size: 26px;
        color: #2563eb;
        font-weight: 700;
      }

      .add-more-btn {
        height: 48px;
        padding: 0 28px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .add-more-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.35);
      }

      .add-more-btn:active {
        transform: translateY(0);
      }

      .section {
        margin-bottom: 50px;
      }

      .poem-container {
        max-width: 900px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        line-height: 2;
        white-space: pre-wrap;
      }

      .poem-column {
        font-style: italic;
        font-size: 17px;
        color: #334155;
        padding: 32px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        border-left: 4px solid #2563eb;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 36px;
        margin-bottom: 30px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.9);
        text-align: center;
      }

      .card h2 {
        font-size: 26px;
        margin-bottom: 24px;
        color: #1e293b;
        border-left: 6px solid #3b82f6;
        padding: 10px 20px;
        font-weight: 700;
        background: #f8fafc;
        border-radius: 10px;
        display: inline-block;
        text-align: center;
      }

      .card-daily {
        background: linear-gradient(145deg, #ffffff, #f0f7ff);
        border: 1px solid #bfdbfe;
        box-shadow: 0 12px 32px rgba(37, 99, 235, 0.12);
        position: relative;
        overflow: hidden;
      }

      .card-daily h2 {
        border-left-color: #2563eb;
        background: linear-gradient(to right, #eff6ff, #dbeafe);
        color: #1e40af;
      }

      .table-wrapper {
        overflow-x: auto;
        border-radius: 14px;
        background: white;
        box-shadow: inset 0 0 0 1px #e2e8f0;
      }

      .table-wrapper-daily {
        box-shadow:
          inset 0 0 0 1px #93c5fd,
          0 4px 12px rgba(37, 99, 235, 0.08);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 0 auto;
        table-layout: auto;
      }

      th {
        background: linear-gradient(to bottom, #f8fafc, #f1f5f9);
        padding: 16px 12px;
        text-align: left;
        font-weight: 700;
        color: #334155;
        cursor: pointer;
        user-select: none;
        white-space: normal;
        border-bottom: 2px solid #e2e8f0;
        font-size: 15px;
        letter-spacing: 0.3px;
        line-height: 1.4;
      }

      th:nth-child(2),
      td:nth-child(2) {
        max-width: 140px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      th.num-col,
      td.num {
        text-align: right !important;
        padding: 16px 12px;
        white-space: nowrap;
      }

      th:hover {
        background: #e2e8f0;
        color: #2563eb;
      }

      .table-daily th {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border-bottom: 2px solid #1d4ed8;
      }

      .table-daily th:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
      }

      .num {
        font-family: "Segoe UI Mono", "Roboto Mono", monospace;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: 0.3px;
      }

      .table-daily .num {
        font-weight: 700;
        font-size: 15px;
      }

      .num-positive {
        color: #059669 !important;
      }
      .num-negative {
        color: #dc2626 !important;
      }
      .num-zero {
        color: #64748b !important;
      }

      tbody tr:hover .num {
        color: #2563eb;
      }

      td {
        padding: 16px 12px;
        border-bottom: 1px solid #f1f5f9;
        color: #475569;
        font-size: 15px;
        transition: all 0.2s ease;
        text-align: left;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr:hover {
        background: #f8fafc;
      }

      .table-daily tbody tr:hover {
        background: linear-gradient(to right, #eff6ff, #f8fafc);
        transform: scale(1.003);
        box-shadow: 0 3px 10px rgba(37, 99, 235, 0.1);
      }

      a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
        padding: 4px 0;
        display: inline-block;
      }

      a:hover {
        text-decoration: underline;
        color: #1d4ed8;
      }

      .footer {
        text-align: center;
        margin-top: 80px;
        color: #64748b;
        font-size: 15px;
        padding: 30px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04);
      }

      @media (max-width: 768px) {
        .hero h1 {
          font-size: 38px;
        }
        .hero h3 {
          font-size: 22px;
        }
        .stats-row {
          gap: 16px;
        }
        .poem-container {
          grid-template-columns: 1fr;
        }
        .card {
          padding: 24px;
        }
        .hero-stats-info {
          font-size: 14px !important;
          line-height: 1.6 !important;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div id="app">
        <div class="loading">⏳ Loading Pantheon Dashboard Data...</div>
      </div>
    </div>

    <script>
      const addMoreUrl = "https://github.com/cadslab/Pantheon/issues";
      let projectData = [];
      let dailyChangeData = [];
      let generalData = [];
      let generalChangeData = [];

      function formatDate(dateStr) {
        if (!dateStr) return "Unknown";
        const date = new Date(dateStr);
        return isNaN(date.getTime()) ? "Unknown" : date.toLocaleString();
      }

      function formatDailyChange(value) {
        const num = Number(value || 0);
        if (num > 0)
          return `<span class="num-positive">↑ +${num.toLocaleString()}</span>`;
        if (num < 0)
          return `<span class="num-negative">↓ ${num.toLocaleString()}</span>`;
        return `<span class="num-zero">—</span>`;
      }

      async function loadData() {
        try {
          const [currentRes, changeRes, generalRes, generalChangeRes] =
            await Promise.all([
              fetch("./status/science_data_current.json"),
              fetch("./status/science_data_change.json"),
              fetch("./status/general_data_current.json"),
              fetch("./status/general_data_change.json"),
            ]);

          if (!currentRes.ok)
            throw new Error("science_data_current.json 加载失败");
          if (!changeRes.ok)
            throw new Error("science_data_change.json 加载失败");
          if (!generalRes.ok)
            throw new Error("general_data_current.json 加载失败");
          if (!generalChangeRes.ok)
            throw new Error("general_data_change.json 加载失败");

          projectData = (await currentRes.json()) || [];
          dailyChangeData = (await changeRes.json()) || [];
          generalData = (await generalRes.json()) || [];
          generalChangeData = (await generalChangeRes.json()) || [];

          renderPage();
        } catch (err) {
          document.getElementById("app").innerHTML = `
                <div class="hero">
                  <h1>⚠️ Data Load Failed</h1>
                  <h3>Please check if the /status/ folder contains all 4 JSON files</h3>
                  <p style="margin-top:20px; color:#dc2626">${err.message}</p>
                </div>
              `;
          console.error("Load failed", err);
        }
      }

      function renderTable(id, title, data, isDaily = false) {
        const formatNum = (n) => Number(n || 0).toLocaleString();
        const cardClass = isDaily ? "card card-daily" : "card";
        const tableClass = isDaily ? "table-daily" : "";
        const wrapperClass = isDaily
          ? "table-wrapper table-wrapper-daily"
          : "table-wrapper";

        let html = `
            <div class="${cardClass}">
              <h2>${title}</h2>
              <div class="${wrapperClass}">
                <table id="${id}" class="${tableClass}">
                  <thead>
                    <tr>
                      <th>Project</th>
                      <th>Developer</th>
                      <th class="num-col">Stars</th>
                      <th class="num-col">Forks</th>
                      <th class="num-col">Watching</th>
                      <th class="num-col">Open<br>Issues</th>
                      <th class="num-col">Closed<br>Issues</th>
                      <th class="num-col">Open<br>Pulls</th>
                      <th class="num-col">Closed<br>Pulls</th>
                      <th class="num-col">Contributors</th>
                      <th>Last Commit</th>
                    </tr>
                  </thead>
                  <tbody>`;

        if (!data || data.length === 0) {
          html += `<tr><td colspan="11" style="text-align:center; padding:30px;">No Data Available</td></tr>`;
          html += `</tbody></table></div></div>`;
          return html;
        }

        data.forEach((item) => {
          if (!item?.name) return;
          const [dev, proj] = item.name.split("/") || ["-", item.name];

          const cells = {
            stars: isDaily
              ? formatDailyChange(item.stars)
              : formatNum(item.stars),
            forks: isDaily
              ? formatDailyChange(item.forks)
              : formatNum(item.forks),
            watching: isDaily
              ? formatDailyChange(item.watching)
              : formatNum(item.watching),
            openIssues: isDaily
              ? formatDailyChange(item.open_issues)
              : formatNum(item.open_issues),
            closedIssues: isDaily
              ? formatDailyChange(item.closed_issues)
              : formatNum(item.closed_issues),
            openPrs: isDaily
              ? formatDailyChange(item.open_prs)
              : formatNum(item.open_prs),
            closedPrs: isDaily
              ? formatDailyChange(item.closed_prs)
              : formatNum(item.closed_prs),
            contributors: isDaily
              ? formatDailyChange(item.contributors)
              : formatNum(item.contributors),
          };

          html += `<tr>
                <td><a href="${item.url || "#"}" target="_blank">${proj || item.name}</a></td>
                <td title="${dev || "-"}">${dev || "-"}</td>
                <td class="num">${cells.stars}</td>
                <td class="num">${cells.forks}</td>
                <td class="num">${cells.watching}</td>
                <td class="num">${cells.openIssues}</td>
                <td class="num">${cells.closedIssues}</td>
                <td class="num">${cells.openPrs}</td>
                <td class="num">${cells.closedPrs}</td>
                <td class="num">${cells.contributors}</td>
                <td>${formatDate(item.last_commit)}</td>
              </tr>`;
        });

        html += `</tbody></table></div></div>`;
        return html;
      }

      function makeTableSortable(tableId) {
        const table = document.getElementById(tableId);
        if (!table) return;
        const headers = table.querySelectorAll("th");
        const numColumns = [2, 3, 4, 5, 6, 7, 8, 9];
        const dateColumn = 10;

        headers.forEach((th, idx) => {
          let sortOrder = 1;
          th.addEventListener("click", () => {
            const rows = Array.from(table.querySelectorAll("tbody tr"));

            rows.sort((a, b) => {
              if (idx === dateColumn) {
                const dateA = new Date(a.cells[idx].textContent);
                const dateB = new Date(b.cells[idx].textContent);
                return (dateB - dateA) * sortOrder;
              }

              const aText = a.cells[idx].textContent
                .trim()
                .replace(/,/g, "")
                .replace(/[^\d-]/g, "");
              const bText = b.cells[idx].textContent
                .trim()
                .replace(/,/g, "")
                .replace(/[^\d-]/g, "");

              if (numColumns.includes(idx)) {
                const aNum = parseFloat(aText) || 0;
                const bNum = parseFloat(bText) || 0;
                return (aNum - bNum) * sortOrder;
              }

              return aText.localeCompare(bText) * sortOrder;
            });

            const tbody = table.querySelector("tbody");
            rows.forEach((row) => tbody.appendChild(row));
            sortOrder *= -1;
          });
        });
      }

      function getTopGainers(data) {
        if (!data || data.length === 0) {
          return {
            starGainer: "None",
            forkGainer: "None",
            watchGainer: "None",
            fixedIssues: "None",
            contributorGainer: "None",
          };
        }
        return {
          starGainer:
            [...data]
              .sort((a, b) => b.stars - a.stars)[0]
              ?.name?.split("/")[1] || "None",
          forkGainer:
            [...data]
              .sort((a, b) => b.forks - a.forks)[0]
              ?.name?.split("/")[1] || "None",
          watchGainer:
            [...data]
              .sort((a, b) => b.watchers - a.watchers)[0]
              ?.name?.split("/")[1] || "None",
          fixedIssues:
            [...data]
              .sort((a, b) => b.closed_issues - a.closed_issues)[0]
              ?.name?.split("/")[1] || "None",
          contributorGainer:
            [...data]
              .sort((a, b) => b.contributors - a.contributors)[0]
              ?.name?.split("/")[1] || "None",
        };
      }

      function getTotalTopProjects(data) {
        if (!data || data.length === 0) {
          return {
            topStar: "None",
            mostForked: "None",
            mostWatched: "None",
            latestUpdate: "None",
            mostFixed: "None",
            mostOpenIssues: "None",
          };
        }
        return {
          topStar:
            [...data]
              .sort((a, b) => b.stars - a.stars)[0]
              ?.name.split("/")[1] || "None",
          mostForked:
            [...data]
              .sort((a, b) => b.forks - a.forks)[0]
              ?.name.split("/")[1] || "None",
          mostWatched:
            [...data]
              .sort((a, b) => b.watchers - a.watchers)[0]
              ?.name.split("/")[1] || "None",
          latestUpdate:
            [...data]
              .sort(
                (a, b) => new Date(b.last_commit) - new Date(a.last_commit),
              )[0]
              ?.name.split("/")[1] || "None",
          mostFixed:
            [...data]
              .sort((a, b) => b.closed_issues - a.closed_issues)[0]
              ?.name.split("/")[1] || "None",
          mostOpenIssues:
            [...data]
              .sort((a, b) => b.open_issues - a.open_issues)[0]
              ?.name.split("/")[1] || "None",
        };
      }

      function renderPage() {
        const app = document.getElementById("app");
        const totalProjects =
          (projectData?.length || 0) + (generalData?.length || 0);

        const dailyStats = getTopGainers(dailyChangeData);
        const totalScienceStats = getTotalTopProjects(projectData);
        const generalDailyStats = getTopGainers(generalChangeData);
        const totalGeneralStats = getTotalTopProjects(generalData);

        app.innerHTML = `
              <div class="hero">
                <h1>🏛️</h1>
                <h1><strong>Pantheon</strong></h1>
                <h2>Automated Research</h2>
                <h3>Unlock the Path, Lead the Way</h3>

                <div class="stats-row">
                  <div class="stat-item">Known Projects: <span>${totalProjects}</span></div>
                  <button class="add-more-btn" onclick="window.open('${addMoreUrl}', '_blank')">
                    Add more
                  </button>
                </div>

                <div class="hero-stats-info" style="margin-top: 20px; font-size:15px; line-height:1.8;">
                  <b>Science Daily:</b> &nbsp;&nbsp;
                  Stars: <b style="color:#059669">${dailyStats.starGainer}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Forks: <b style="color:#059669">${dailyStats.forkGainer}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Watching: <b style="color:#059669">${dailyStats.watchGainer}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Fixed: <b style="color:#059669">${dailyStats.fixedIssues}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Contributors: <b style="color:#059669">${dailyStats.contributorGainer}</b>
                </div>

                <div class="hero-stats-info" style="margin-top: 10px; font-size:15px; line-height:1.8;">
                  <b>General Daily:</b> &nbsp;&nbsp;
                  Stars: <b style="color:#059669">${generalDailyStats.starGainer}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Forks: <b style="color:#059669">${generalDailyStats.forkGainer}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Watching: <b style="color:#059669">${generalDailyStats.watchGainer}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Fixed: <b style="color:#059669">${generalDailyStats.fixedIssues}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Contributors: <b style="color:#059669">${generalDailyStats.contributorGainer}</b>
                </div>

                <div style="margin-top: 20px; font-size: 15px; color: #475569; line-height: 1.8;">
                  <b>Science Total:</b> &nbsp;&nbsp;
                  Stars: <b>${totalScienceStats.topStar}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Forked: <b>${totalScienceStats.mostForked}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Watching: <b>${totalScienceStats.mostWatched}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Updated: <b>${totalScienceStats.latestUpdate}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Fixed: <b>${totalScienceStats.mostFixed}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Open Issues: <b>${totalScienceStats.mostOpenIssues}</b>
                </div>

                <div style="margin-top: 10px; font-size: 15px; color: #475569; line-height: 1.8;">
                  <b>General Total:</b> &nbsp;&nbsp;
                  Stars: <b>${totalGeneralStats.topStar}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Forked: <b>${totalGeneralStats.mostForked}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Watching: <b>${totalGeneralStats.mostWatched}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Updated: <b>${totalGeneralStats.latestUpdate}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Fixed: <b>${totalGeneralStats.mostFixed}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
                  Open Issues: <b>${totalGeneralStats.mostOpenIssues}</b>
                </div>
              </div>

              <div class="section">
                ${renderTable("dailyTable", "📈 Science - Daily Dashboard", dailyChangeData, true)}
              </div>
              <div class="section">
                ${renderTable("dashboardTable", "🔬 Science - Projects Dashboard", projectData)}
              </div>

              <div class="section">
                ${renderTable("generalDailyTable", "📊 General - Daily Dashboard", generalChangeData, true)}
              </div>
              <div class="section">
                ${renderTable("generalDashboardTable", "📦 General - Projects Dashboard", generalData)}
              </div>

              <div class="section">
                <div class="poem-container">
                  <div class="poem-column">
      When chaos first gave way to hidden truths profound,
      Mortal seekers wandered lost, with no clear way bound.
      No need to toil through volumes thousand-fold,
      For wit unbodied breaks the darkness cold.

      Since ancient times, all who sought wisdom's gate,
      Faced mountains of texts, vast seas of reason,
      Trials of experiment, strokes of fate,
      Too often spent their years in endless season.
                  </div>
                  <div class="poem-column">
      Now a new path dawns: a bodiless mind,
      Without form or voice, yet with logic refined.
      It reads, it knows, it reasons, it reveals,
      Crossing every barrier truth conceals.

      May this art guide all who wander far,
      To find the light, and reach the shining star.
                  </div>
                </div>
              </div>

              <div class="footer">
                <h3>License</h3>
                <p>MIT License</p>
              </div>
            `;

        setTimeout(() => {
          [
            "dailyTable",
            "dashboardTable",
            "generalDailyTable",
            "generalDashboardTable",
          ].forEach(makeTableSortable);
        }, 0);
      }

      window.onload = loadData;
    </script>
  </body>
</html>

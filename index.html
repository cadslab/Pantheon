<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Pantheon for Auto Research</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        min-height: 100vh;
        padding: 20px 12px;
        color: #1e293b;
        line-height: 1.6;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
      }

      .hero {
        text-align: center;
        margin-bottom: 30px;
        padding: 30px 20px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.8);
      }

      .hero h1 {
        font-size: 42px;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }

      .hero h2 {
        font-size: 20px;
        color: #475569;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .hero h3 {
        font-size: 20px;
        color: #64748b;
        font-weight: 400;
        margin-bottom: 20px;
      }

      .stats-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      .stat-item {
        font-size: 15px;
        font-weight: 600;
        color: #334155;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px 14px;
        background: #f1f5f9;
        border-radius: 12px;
        min-height: 44px;
        white-space: nowrap;
      }

      .stat-item span {
        font-size: 20px;
        color: #2563eb;
        font-weight: 700;
      }

      .add-more-btn {
        height: 44px;
        padding: 0 24px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }

      .add-more-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.35);
      }

      .add-more-btn:active {
        transform: translateY(0);
      }

      .section {
        margin-bottom: 30px;
      }

      .poem-container {
        max-width: 900px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        line-height: 1.8;
        white-space: pre-wrap;
      }

      .poem-column {
        font-style: italic;
        font-size: 15px;
        color: #334155;
        padding: 20px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        border-left: 4px solid #2563eb;
      }

      .card {
        background: white;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.9);
        text-align: center;
        width: 100%;
        overflow: hidden;
      }

      .card h2 {
        font-size: 20px;
        margin-bottom: 16px;
        color: #1e293b;
        border-left: 6px solid #3b82f6;
        padding: 8px 16px;
        font-weight: 700;
        background: #f8fafc;
        border-radius: 8px;
        display: inline-block;
        text-align: center;
      }

      .card-daily {
        background: linear-gradient(145deg, #ffffff, #f0f7ff);
        border: 1px solid #bfdbfe;
        box-shadow: 0 12px 32px rgba(37, 99, 235, 0.12);
        position: relative;
        overflow: hidden;
      }

      .card-daily h2 {
        border-left-color: #2563eb;
        background: linear-gradient(to right, #eff6ff, #dbeafe);
        color: #1e40af;
      }

      .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 12px;
        background: white;
        box-shadow: inset 0 0 0 1px #e2e8f0;
        width: 100%;
      }

      .table-wrapper-daily {
        box-shadow:
          inset 0 0 0 1px #93c5fd,
          0 4px 12px rgba(37, 99, 235, 0.08);
      }

      table {
        width: 100%;
        min-width: 900px;
        border-collapse: collapse;
        margin: 0 auto;
      }

      th {
        background: linear-gradient(to bottom, #f8fafc, #f1f5f9);
        padding: 12px 10px;
        text-align: left;
        font-weight: 700;
        color: #334155;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
        border-bottom: 2px solid #e2e8f0;
        font-size: 13px;
        letter-spacing: 0.3px;
      }

      th:hover {
        background: #e2e8f0;
        color: #2563eb;
      }

      .table-daily th {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border-bottom: 2px solid #1d4ed8;
      }

      .table-daily th:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
      }

      .num-col {
        text-align: right !important;
      }

      .num {
        text-align: right !important;
        font-family: "Segoe UI Mono", "Roboto Mono", monospace;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: 0.3px;
      }

      .table-daily .num {
        font-weight: 700;
        font-size: 13px;
      }

      .num-positive {
        color: #059669 !important;
      }
      .num-negative {
        color: #dc2626 !important;
      }
      .num-zero {
        color: #64748b !important;
      }

      tbody tr:hover .num {
        color: #2563eb;
      }

      td {
        padding: 12px 10px;
        border-bottom: 1px solid #f1f5f9;
        color: #475569;
        font-size: 13px;
        transition: all 0.2s ease;
        text-align: left;
        white-space: nowrap;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr:hover {
        background: #f8fafc;
      }

      .table-daily tbody tr:hover {
        background: linear-gradient(to right, #eff6ff, #f8fafc);
        transform: scale(1.003);
        box-shadow: 0 3px 10px rgba(37, 99, 235, 0.1);
      }

      a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
        padding: 2px 0;
        display: inline-block;
      }

      a:hover {
        text-decoration: underline;
        color: #1d4ed8;
      }

      .footer {
        text-align: center;
        margin-top: 40px;
        color: #64748b;
        font-size: 14px;
        padding: 20px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04);
      }

      /* 移动端核心适配 */
      @media (max-width: 768px) {
        .hero h1 {
          font-size: 32px;
        }
        .hero h2 {
          font-size: 18px;
        }
        .hero h3 {
          font-size: 16px;
        }
        .stats-row {
          gap: 12px;
        }
        .stat-item {
          font-size: 14px;
          padding: 6px 12px;
        }
        .add-more-btn {
          font-size: 14px;
          padding: 0 20px;
        }
        .poem-container {
          grid-template-columns: 1fr;
          gap: 16px;
        }
        .poem-column {
          font-size: 14px;
          padding: 16px;
        }
        .card {
          padding: 16px;
        }
        .card h2 {
          font-size: 18px;
        }
        table {
          min-width: 800px;
        }
        th,
        td {
          padding: 10px 8px;
          font-size: 12px;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 15px 8px;
        }
        .hero {
          padding: 20px 15px;
        }
        .hero-stats-info,
        .hero > div[style*="margin-top"] {
          font-size: 12px !important;
          line-height: 1.6 !important;
          padding: 0 4px;
        }
        table {
          min-width: 700px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div id="app"></div>
    </div>

    <script>
      const addMoreUrl = "https://github.com/cadslab/Pantheon/issues";
      let projectData = [];
      let dailyChangeData = [];

      function formatDate(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleString();
      }

      function formatDailyChange(value) {
        const num = Number(value || 0);
        if (num > 0)
          return `<span class="num-positive">↑ +${num.toLocaleString()}</span>`;
        if (num < 0)
          return `<span class="num-negative">↓ ${num.toLocaleString()}</span>`;
        return `<span class="num-zero">${num}</span>`;
      }

      async function loadData() {
        try {
          const currentRes = await fetch("./data_current.json");
          if (!currentRes.ok)
            throw new Error("Failed to load data_current.json");
          projectData = await currentRes.json();

          const changeRes = await fetch("./data_change.json");
          if (!changeRes.ok) throw new Error("Failed to load data_change.json");
          dailyChangeData = await changeRes.json();

          renderPage();
        } catch (err) {
          document.getElementById("app").innerHTML = `
        <div class="hero">
          <h1>⚠️ Failed to load</h1>
          <h3>Make sure data_current.json and data_change.json are in the same folder</h3>
        </div>
      `;
          console.error("Load failed", err);
        }
      }

      function renderTable(id, title, data, isDaily = false) {
        function formatNum(n) {
          return Number(n || 0).toLocaleString();
        }

        const cardClass = isDaily ? "card card-daily" : "card";
        const tableClass = isDaily ? "table-daily" : "";
        const wrapperClass = isDaily
          ? "table-wrapper table-wrapper-daily"
          : "table-wrapper";

        let html = `
    <div class="${cardClass}">
      <h2>${title}</h2>
      <div class="${wrapperClass}">
        <table id="${id}" class="${tableClass}">
          <thead>
            <tr>
              <th>Project</th>
              <th>Developer</th>
              <th class="num-col">Stars</th>
              <th class="num-col">Forks</th>
              <th class="num-col">Open Issues</th>
              <th class="num-col">Closed Issues</th>
              <th class="num-col">Open Pulls</th>
              <th class="num-col">Closed Pulls</th>
              <th class="num-col">Contributors</th>
              <th>Last Commit</th>
            </tr>
          </thead>
          <tbody>`;

        data.forEach((item) => {
          const [dev, proj] = item.name.split("/");

          const starsCell = isDaily
            ? formatDailyChange(item.stars)
            : formatNum(item.stars);
          const forksCell = isDaily
            ? formatDailyChange(item.forks)
            : formatNum(item.forks);
          const openIssuesCell = isDaily
            ? formatDailyChange(item.open_issues)
            : formatNum(item.open_issues);
          const closedIssuesCell = isDaily
            ? formatDailyChange(item.closed_issues)
            : formatNum(item.closed_issues);
          const openPrsCell = isDaily
            ? formatDailyChange(item.open_prs)
            : formatNum(item.open_prs);
          const closedPrsCell = isDaily
            ? formatDailyChange(item.closed_prs)
            : formatNum(item.closed_prs);
          const contributorsCell = isDaily
            ? formatDailyChange(item.contributors)
            : formatNum(item.contributors);

          html += `<tr>
        <td><a href="${item.url}" target="_blank">${proj}</a></td>
        <td>${dev}</td>
        <td class="num">${starsCell}</td>
        <td class="num">${forksCell}</td>
        <td class="num">${openIssuesCell}</td>
        <td class="num">${closedIssuesCell}</td>
        <td class="num">${openPrsCell}</td>
        <td class="num">${closedPrsCell}</td>
        <td class="num">${contributorsCell}</td>
        <td>${formatDate(item.last_commit)}</td>
      </tr>`;
        });

        html += `</tbody></table></div></div>`;
        return html;
      }

      function makeTableSortable(tableId) {
        const table = document.getElementById(tableId);
        if (!table) return;
        const headers = table.querySelectorAll("th");
        const numColumns = [2, 3, 4, 5, 6, 7, 8];

        headers.forEach((th, idx) => {
          let sortOrder = 1;
          th.addEventListener("click", () => {
            const rows = Array.from(table.querySelectorAll("tbody tr"));
            rows.sort((a, b) => {
              const aText = a.cells[idx].textContent
                .trim()
                .replace(/,/g, "")
                .replace(/[^\d-]/g, "");
              const bText = b.cells[idx].textContent
                .trim()
                .replace(/,/g, "")
                .replace(/[^\d-]/g, "");

              if (numColumns.includes(idx)) {
                const aNum = parseFloat(aText) || 0;
                const bNum = parseFloat(bText) || 0;
                return (aNum - bNum) * sortOrder;
              }
              return aText.localeCompare(bText) * sortOrder;
            });

            const tbody = table.querySelector("tbody");
            rows.forEach((row) => tbody.appendChild(row));
            sortOrder *= -1;
          });
        });
      }

      function getDailyTopGainers() {
        if (!dailyChangeData.length) {
          return {
            starGainer: "None",
            forkGainer: "None",
            fixedIssues: "None",
            contributorGainer: "None",
          };
        }

        const sortedByStars = [...dailyChangeData].sort(
          (a, b) => b.stars - a.stars,
        );
        const sortedByForks = [...dailyChangeData].sort(
          (a, b) => b.forks - a.forks,
        );
        const sortedByClosedIssues = [...dailyChangeData].sort(
          (a, b) => b.closed_issues - a.closed_issues,
        );
        const sortedByContributors = [...dailyChangeData].sort(
          (a, b) => b.contributors - a.contributors,
        );

        return {
          starGainer: sortedByStars[0]?.name.split("/")[1] || "None",
          forkGainer: sortedByForks[0]?.name.split("/")[1] || "None",
          fixedIssues: sortedByClosedIssues[0]?.name.split("/")[1] || "None",
          contributorGainer:
            sortedByContributors[0]?.name.split("/")[1] || "None",
        };
      }

      function renderPage() {
        const app = document.getElementById("app");
        if (!projectData.length || !dailyChangeData.length) {
          app.innerHTML = `<div class="hero"><h1>📊 No project data</h1></div>`;
          return;
        }

        // 修复手机浏览器不支持 toSorted 的问题
        const sortedByStars = [...projectData].sort(
          (a, b) => b.stars - a.stars,
        );
        const sortedByForks = [...projectData].sort(
          (a, b) => b.forks - a.forks,
        );
        const sortedByUpdate = [...projectData].sort(
          (a, b) => new Date(b.last_commit) - new Date(a.last_commit),
        );
        const sortedByClosedIssues = [...projectData].sort(
          (a, b) => b.closed_issues - a.closed_issues,
        );
        const sortedByOpenIssues = [...projectData].sort(
          (a, b) => b.open_issues - a.open_issues,
        );

        const topStarProject = sortedByStars[0]?.name.split("/")[1] || "None";
        const mostForkedProject =
          sortedByForks[0]?.name.split("/")[1] || "None";
        const latestUpdateProject =
          sortedByUpdate[0]?.name.split("/")[1] || "None";
        const mostFixedProject =
          sortedByClosedIssues[0]?.name.split("/")[1] || "None";
        const mostOpenIssuesProject =
          sortedByOpenIssues[0]?.name.split("/")[1] || "None";

        const dailyStats = getDailyTopGainers();
        const topDailyStarGainer = dailyStats.starGainer;
        const topDailyForkGainer = dailyStats.forkGainer;
        const topDailyFixedIssues = dailyStats.fixedIssues;
        const topDailyContributorGainer = dailyStats.contributorGainer;

        app.innerHTML = `
      <div class="hero">
        <h1>🏛️</h1>
        <h1><strong>Pantheon</strong></h1>
        <h2>Auto Research</h2>
        <h3>Unlock the Path, Lead the Way</h3>

        <div class="stats-row">
          <div class="stat-item">Known Projects: <span>${projectData.length}</span></div>
          <button class="add-more-btn" onclick="window.open('${addMoreUrl}', '_blank')">
            Add more
          </button>
        </div>

        <div class="hero-stats-info" style="margin-top: 20px; font-size:14px; color:#475569; line-height:1.8;">
          <b>Daily:</b> &nbsp;&nbsp;
          Most Stars Growth: <b style="color:#059669">${topDailyStarGainer}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Most Forks Growth: <b style="color:#059669">${topDailyForkGainer}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Most Fixed Issues: <b style="color:#059669">${topDailyFixedIssues}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Most Contributors Added: <b style="color:#059669">${topDailyContributorGainer}</b>
        </div>

        <div style="margin-top: 15px; font-size: 14px; color: #475569; line-height: 1.8;">
          <b>Total:</b> &nbsp;&nbsp;
          Most Stars: <b>${topStarProject}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Most Forked: <b>${mostForkedProject}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Latest Updated: <b>${latestUpdateProject}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Most Fixed: <b>${mostFixedProject}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Most Open Issues: <b>${mostOpenIssuesProject}</b>
        </div>
      </div>

      <div class="section">
        ${renderTable("dailyTable", "📈 Daily Dashboard", dailyChangeData, true)}
      </div>

      <div class="section">
        ${renderTable("dashboardTable", "Projects Dashboard", projectData)}
      </div>

      <div class="section">
        <div class="poem-container">
          <div class="poem-column">
When chaos first gave way to hidden truths profound,
Mortal seekers wandered lost, with no clear way bound.
No need to toil through volumes thousand-fold,
For wit unbodied breaks the darkness cold.

Since ancient times, all who sought wisdom's gate,
Faced mountains of texts, vast seas of reason,
Trials of experiment, strokes of fate,
Too often spent their years in endless season.
          </div>
          <div class="poem-column">
Now a new path dawns: a bodiless mind,
Without form or voice, yet with logic refined.
It reads, it knows, it reasons, it reveals,
Crossing every barrier truth conceals.

May this art guide all who wander far,
To find the light, and reach the shining star.
          </div>
        </div>
      </div>

      <div class="footer">
        <h3>License</h3>
        <p>MIT License</p>
      </div>
    `;

        setTimeout(() => {
          makeTableSortable("dailyTable");
          makeTableSortable("dashboardTable");
        }, 0);
      }

      window.onload = loadData;
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantheon - Automated Research</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        min-height: 100vh;
        padding: 40px 20px;
        color: #1e293b;
        line-height: 1.6;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      /* 顶部标题卡片美化 */
      .hero {
        text-align: center;
        margin-bottom: 40px;
        padding: 50px 30px;
        background: white;
        border-radius: 24px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.8);
      }

      .hero h1 {
        font-size: 52px;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }

      .hero h2 {
        font-size: 24px;
        color: #475569;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .hero h3 {
        font-size: 26px;
        color: #64748b;
        font-weight: 400;
        margin-bottom: 30px;
      }

      /* 统计栏美化 */
      .stats-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 36px;
        margin-top: 24px;
        flex-wrap: wrap;
      }

      .stat-item {
        font-size: 18px;
        font-weight: 600;
        color: #334155;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        background: #f1f5f9;
        border-radius: 12px;
      }

      .stat-item span {
        font-size: 26px;
        color: #2563eb;
        font-weight: 700;
      }

      /* 按钮美化 */
      .add-more-btn {
        margin-top: 15px;
        padding: 12px 28px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
      }

      .add-more-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.35);
      }

      .add-more-btn:active {
        transform: translateY(0);
      }

      /* 区块间距 */
      .section {
        margin-bottom: 50px;
      }

      /* 诗歌卡片美化 */
      .poem-container {
        max-width: 900px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        line-height: 2;
        white-space: pre-wrap;
      }

      .poem-column {
        font-style: italic;
        font-size: 17px;
        color: #334155;
        padding: 32px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        border-left: 4px solid #2563eb;
      }

      /* 数据卡片美化（核心列表外观） */
      .card {
        background: white;
        border-radius: 20px;
        padding: 36px;
        margin-bottom: 30px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.06);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.8);
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.08);
      }

      .card h2 {
        font-size: 26px;
        margin-bottom: 24px;
        color: #1e293b;
        border-left: 6px solid #3b82f6;
        padding: 8px 16px;
        font-weight: 700;
        background: #f8fafc;
        border-radius: 10px;
      }

      /* 表格容器美化 */
      .table-wrapper {
        overflow-x: auto;
        border-radius: 14px;
        background: white;
        box-shadow: inset 0 0 0 1px #e2e8f0;
      }

      /* 表格样式（列表美化核心） */
      table {
        width: 100%;
        min-width: 1100px;
        border-collapse: collapse;
      }

      th {
        background: linear-gradient(to bottom, #f8fafc, #f1f5f9);
        padding: 16px 14px;
        text-align: left;
        font-weight: 700;
        color: #334155;
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
        border-bottom: 2px solid #e2e8f0;
        font-size: 15px;
        letter-spacing: 0.3px;
      }

      th:hover {
        background: #e2e8f0;
        color: #2563eb;
      }
      /* 表格数字列美化 */
      .num-col {
        text-align: right !important;
      }

      .num {
        text-align: right !important;
        font-family: "Segoe UI Mono", "Roboto Mono", monospace;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: 0.3px;
      }
      tbody tr:hover .num {
        color: #2563eb;
      }

      td {
        padding: 16px 14px;
        border-bottom: 1px solid #f1f5f9;
        color: #475569;
        font-size: 15px;
        transition: background 0.2s;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr:hover {
        background: #f8fafc;
      }

      /* 链接美化 */
      a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
        padding: 4px 0;
        display: inline-block;
      }

      a:hover {
        text-decoration: underline;
        color: #1d4ed8;
      }

      /* 页脚美化 */
      .footer {
        text-align: center;
        margin-top: 80px;
        color: #64748b;
        font-size: 15px;
        padding: 30px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04);
      }

      /* 响应式优化 */
      @media (max-width: 768px) {
        .hero h1 {
          font-size: 38px;
        }

        .hero h3 {
          font-size: 22px;
        }

        .stats-row {
          gap: 16px;
        }

        .poem-container {
          grid-template-columns: 1fr;
        }

        .card {
          padding: 24px;
        }

        .add-more-btn {
          padding: 10px 22px;
          font-size: 15px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div id="app"></div>
    </div>

    <script>
      const addMoreUrl = "https://github.com/cadslab/Pantheon/issues";
      let projectData = [];

      // 格式化时间
      function formatDate(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleString();
      }

      // 从 data.json 加载数据
      async function loadData() {
        try {
          const res = await fetch("./data.json");
          projectData = await res.json();
          renderPage();
        } catch (err) {
          console.error("加载数据失败", err);
        }
      }

      // 渲染表格
      // 渲染表格
      function renderTable(id, title, data) {
        // 数字千分位格式化
        function formatNum(n) {
          return Number(n || 0).toLocaleString();
        }

        let html = `
  <div class="card">
    <h2>${title}</h2>
    <div class="table-wrapper">
      <table id="${id}">
        <thead>
          <tr>
            <th>Project</th>
            <th>Developer</th>
            <th class="num-col">Stars</th>
            <th class="num-col">Forks</th>
            <th class="num-col">Closed Issues</th>
            <th class="num-col">Open Pulls</th>
            <th class="num-col">Closed Pulls</th>
            <th class="num-col">Contributors</th>
            <th>Last Commit</th>
          </tr>
        </thead>
        <tbody>`;

        data.forEach((item) => {
          const [dev, proj] = item.name.split("/");
          html += `<tr>
      <td><a href="${item.url}" target="_blank">${proj}</a></td>
      <td>${dev}</td>
      <td class="num">${formatNum(item.stars)}</td>
      <td class="num">${formatNum(item.forks)}</td>
      <td class="num">${formatNum(item.closed_issues)}</td>
      <td class="num">${formatNum(item.open_prs)}</td>
      <td class="num">${formatNum(item.closed_prs)}</td>
      <td class="num">${formatNum(item.contributors)}</td>
      <td>${formatDate(item.last_commit)}</td>
    </tr>`;
        });

        html += `</tbody></table></div></div>`;
        return html;
      }

      // 表格排序
      function makeTableSortable(tableId) {
        const table = document.getElementById(tableId);
        if (!table) return;
        const headers = table.querySelectorAll("th");
        headers.forEach((th, idx) => {
          let sortOrder = 1;
          th.addEventListener("click", () => {
            const rows = Array.from(table.querySelectorAll("tbody tr"));
            rows.sort((a, b) => {
              const aText = a.cells[idx].textContent.trim().toLowerCase();
              const bText = b.cells[idx].textContent.trim().toLowerCase();
              return aText.localeCompare(bText) * sortOrder;
            });
            rows.forEach((row) =>
              table.querySelector("tbody").appendChild(row),
            );
            sortOrder *= -1;
          });
        });
      }

      // 渲染页面
      // 渲染页面
      function renderPage() {
        const app = document.getElementById("app");

        // ====== 新增：计算各项排名 ======
        const sortedByStars = [...projectData].sort(
          (a, b) => b.stars - a.stars,
        );
        const sortedByUpdate = [...projectData].sort(
          (a, b) => new Date(b.last_commit) - new Date(a.last_commit),
        );
        const sortedByClosedIssues = [...projectData].sort(
          (a, b) => b.closed_issues - a.closed_issues,
        );
        const sortedByOpenIssues = [...projectData].sort(
          (a, b) => b.open_prs - a.open_prs,
        );

        const topStarProject = sortedByStars[0]?.name.split("/")[1] || "无";
        const latestUpdateProject =
          sortedByUpdate[0]?.name.split("/")[1] || "无";
        const mostForkedProject = sortedByStars[0]?.name.split("/")[1] || "无";
        const mostFixedProject =
          sortedByClosedIssues[0]?.name.split("/")[1] || "无";
        const mostOpenIssuesProject =
          sortedByOpenIssues[0]?.name.split("/")[1] || "无";
        // ====== 新增结束 ======

        app.innerHTML = `
      <div class="hero">
        <h1>🏛️</h1>
        <h1><strong>Pantheon</strong></h1>
        <h2>Automated Research</h2>
        <h3>Unlock the Path, Lead the Way</h3>
        <div class="stats-row">
          <div class="stat-item">Known Projects: <span>${projectData.length}</span></div>
          <button class="add-more-btn" onclick="window.open('${addMoreUrl}', '_blank')">
            Add more
          </button>
        </div>

        <div style="margin-top: 20px; font-size: 15px; color: #475569; line-height: 1.8;">
          Most Forked: <b>${mostForkedProject}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Latest Updated: <b>${latestUpdateProject}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Most Stars: <b>${topStarProject}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Most Fixed: <b>${mostFixedProject}</b> &nbsp;&nbsp;|&nbsp;&nbsp;
          Most Open Issues: <b>${mostOpenIssuesProject}</b>
        </div>

      </div>

      <div class="section">
        ${renderTable("dashboardTable", "Projects Dashboard", projectData)}
      </div>

      <div class="section">
        <div class="poem-container">
          <div class="poem-column">
When chaos first gave way to hidden truths profound,
Mortal seekers wandered lost, with no clear way bound.
No need to toil through volumes thousand-fold,
For wit unbodied breaks the darkness cold.

Since ancient times, all who sought wisdom's gate,
Faced mountains of texts, vast seas of reason,
Trials of experiment, strokes of fate,
Too often spent their years in endless season.
          </div>
          <div class="poem-column">
Now a new path dawns: a bodiless mind,
Without form or voice, yet with logic refined.
It reads, it knows, it reasons, it reveals,
Crossing every barrier truth conceals.

May this art guide all who wander far,
To find the light, and reach the shining star.
          </div>
        </div>
      </div>

      <div class="footer">
        <h3>License</h3>
        <p>MIT License</p>
      </div>
    `;

        setTimeout(() => makeTableSortable("dashboardTable"), 0);
      }

      // 启动
      window.onload = loadData;
    </script>
  </body>
</html>

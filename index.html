<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantheon - Automated Research</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
        min-height: 100vh;
        padding: 40px 20px;
        color: #1e293b;
        line-height: 1.6;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .loading {
        text-align: center;
        padding: 60px 20px;
        font-size: 20px;
        color: #475569;
      }

      .hero {
        text-align: center;
        margin-bottom: 40px;
        padding: 50px 30px;
        background: white;
        border-radius: 24px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.8);
      }

      .hero h1 {
        font-size: 52px;
        font-weight: 800;
        color: #0f172a;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }

      .hero h2 {
        font-size: 24px;
        color: #475569;
        font-weight: 500;
        margin-bottom: 8px;
      }

      .hero h3 {
        font-size: 26px;
        color: #64748b;
        font-weight: 400;
        margin-bottom: 30px;
      }

      .stats-row {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 36px;
        margin-top: 24px;
        flex-wrap: wrap;
      }

      .stat-item {
        font-size: 18px;
        font-weight: 600;
        color: #334155;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        background: #f1f5f9;
        border-radius: 12px;
        height: 48px;
      }

      .stat-item span {
        font-size: 26px;
        color: #2563eb;
        font-weight: 700;
      }

      .add-more-btn {
        height: 48px;
        padding: 0 28px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.25);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .add-more-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.35);
      }

      .add-more-btn:active {
        transform: translateY(0);
      }

      .section {
        margin-bottom: 50px;
      }

      .chart-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-bottom: 50px;
      }
      .chart-card {
        background: #fff;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      }
      .chart-box {
        width: 100%;
        height: 520px;
      }

      .poem-container {
        max-width: 900px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        line-height: 2;
        white-space: pre-wrap;
      }

      .poem-column {
        font-style: italic;
        font-size: 17px;
        color: #334155;
        padding: 32px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        border-left: 4px solid #2563eb;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 36px;
        margin-bottom: 30px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.9);
        text-align: center;
      }

      .card h2 {
        font-size: 26px;
        margin-bottom: 24px;
        color: #1e293b;
        border-left: 6px solid #3b82f6;
        padding: 10px 20px;
        font-weight: 700;
        background: #f8fafc;
        border-radius: 10px;
        display: inline-block;
        text-align: center;
      }

      .card-daily {
        background: linear-gradient(145deg, #ffffff, #f0f7ff);
        border: 1px solid #bfdbfe;
        box-shadow: 0 12px 32px rgba(37, 99, 235, 0.12);
        position: relative;
        overflow: hidden;
      }

      .card-daily h2 {
        border-left-color: #2563eb;
        background: linear-gradient(to right, #eff6ff, #dbeafe);
        color: #1e40af;
      }

      .table-wrapper {
        overflow-x: auto;
        border-radius: 14px;
        background: white;
        box-shadow: inset 0 0 0 1px #e2e8f0;
      }

      .table-wrapper-daily {
        box-shadow:
          inset 0 0 0 1px #93c5fd,
          0 4px 12px rgba(37, 99, 235, 0.08);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 0 auto;
        table-layout: auto;
      }

      th {
        background: linear-gradient(to bottom, #f8fafc, #f1f5f9);
        padding: 16px 12px;
        text-align: left;
        font-weight: 700;
        color: #334155;
        cursor: pointer;
        user-select: none;
        white-space: normal;
        border-bottom: 2px solid #e2e8f0;
        font-size: 15px;
        letter-spacing: 0.3px;
        line-height: 1.4;
      }

      th:nth-child(2),
      td:nth-child(2) {
        max-width: 140px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      th.num-col,
      td.num {
        text-align: right !important;
        padding: 16px 12px;
        white-space: nowrap;
      }

      th:hover {
        background: #e2e8f0;
        color: #2563eb;
      }

      .table-daily th {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border-bottom: 2px solid #1d4ed8;
      }

      .table-daily th:hover {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
      }

      .num {
        font-family: "Segoe UI Mono", "Roboto Mono", monospace;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: 0.3px;
      }

      .table-daily .num {
        font-weight: 700;
        font-size: 15px;
      }

      .num-positive {
        color: #059669 !important;
      }
      .num-negative {
        color: #dc2626 !important;
      }
      .num-zero {
        color: #64748b !important;
      }

      tbody tr:hover .num {
        color: #2563eb;
      }

      td {
        padding: 16px 12px;
        border-bottom: 1px solid #f1f5f9;
        color: #475569;
        font-size: 15px;
        transition: all 0.2s ease;
        text-align: left;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr:hover {
        background: #f8fafc;
      }

      .table-daily tbody tr:hover {
        background: linear-gradient(to right, #eff6ff, #f8fafc);
        transform: scale(1.003);
        box-shadow: 0 3px 10px rgba(37, 99, 235, 0.1);
      }

      a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
        padding: 4px 0;
        display: inline-block;
      }

      a:hover {
        text-decoration: underline;
        color: #1d4ed8;
      }

      .footer {
        text-align: center;
        margin-top: 80px;
        color: #64748b;
        font-size: 15px;
        padding: 30px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.04);
      }

      @media (max-width: 768px) {
        .hero h1 {
          font-size: 38px;
        }
        .hero h3 {
          font-size: 22px;
        }
        .stats-row {
          gap: 16px;
        }
        .poem-container {
          grid-template-columns: 1fr;
        }
        .card {
          padding: 24px;
        }
        .hero-stats-info {
          font-size: 14px !important;
          line-height: 1.6 !important;
        }
        .chart-row {
          grid-template-columns: 1fr;
        }
        .chart-box {
          height: 420px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div id="app">
        <div class="loading">⏳ Loading Pantheon Dashboard Data...</div>
      </div>
    </div>

    <script>
      function getDateStr(dayOffset = 0) {
        const d = new Date();
        d.setDate(d.getDate() + dayOffset);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}${m}${day}`;
      }

      const todayDate = getDateStr(0);
      const prevDate = getDateStr(-1);
      const addMoreUrl = "https://github.com/cadslab/Pantheon/issues";

      let projectData = [];
      let prevProjectData = [];
      let generalData = [];
      let prevGeneralData = [];

      // Heat score data
      let scienceHeatData = [];
      let generalHeatData = [];

      let scienceChart = null;
      let generalChart = null;

      function calcDiff(curr, prev) {
        const empty = {
          stars: 0,
          forks: 0,
          watching: 0,
          open_issues: 0,
          closed_issues: 0,
          open_prs: 0,
          closed_prs: 0,
          contributors: 0,
          commits: 0,
        };
        if (!prev) return empty;
        return {
          stars: Number(curr.stars ?? 0) - Number(prev.stars ?? 0),
          forks: Number(curr.forks ?? 0) - Number(prev.forks ?? 0),
          watching: Number(curr.watching ?? 0) - Number(prev.watching ?? 0),
          open_issues:
            Number(curr.open_issues ?? 0) - Number(prev.open_issues ?? 0),
          closed_issues:
            Number(curr.closed_issues ?? 0) - Number(prev.closed_issues ?? 0),
          open_prs: Number(curr.open_prs ?? 0) - Number(prev.open_prs ?? 0),
          closed_prs:
            Number(curr.closed_prs ?? 0) - Number(prev.closed_prs ?? 0),
          contributors:
            Number(curr.contributors ?? 0) - Number(prev.contributors ?? 0),
          commits: Number(curr.commits ?? 0) - Number(prev.commits ?? 0),
        };
      }

      function buildDiffList(todayList, prevList) {
        return todayList.map((item) => {
          const prevItem = prevList.find((x) => x.name === item.name);
          return { ...item, ...calcDiff(item, prevItem) };
        });
      }

      function formatDate(dateStr) {
        if (!dateStr) return "Unknown";
        const date = new Date(dateStr);
        return isNaN(date.getTime()) ? "Unknown" : date.toLocaleString();
      }

      function formatDailyChange(value) {
        const num = Number(value || 0);
        if (num > 0)
          return `<span class="num-positive">↑ +${num.toLocaleString()}</span>`;
        if (num < 0)
          return `<span class="num-negative">↓ ${num.toLocaleString()}</span>`;
        return `<span class="num-zero">—</span>`;
      }

      // Sort by total_heat descending: higher heat on top
      // 🔥 已修复：Heat high on top
      function initHeatHorizontalBarChart(domId, title, heatList) {
        const el = document.getElementById(domId);
        const chart = echarts.init(el);

        // 1. 先按热度 降序：大→小
        const sorted = [...heatList].sort(
          (a, b) => b.total_heat - a.total_heat,
        );

        const names = sorted.map((item) => {
          const sp = item.repo.split("/");
          return sp.length > 1 ? sp[1] : item.repo;
        });
        const totalHeat = sorted.map((item) => item.total_heat || 0);

        const option = {
          title: {
            text: title,
            left: "center",
            textStyle: { color: "#1e293b", fontSize: 18, fontWeight: "600" },
          },
          tooltip: {
            trigger: "axis",
            axisPointer: { type: "shadow" },
            formatter: function (params) {
              const idx = params[0].dataIndex;
              const d = sorted[idx];
              return `
        <div style="text-align:left">
          <div>Repository: ${d.repo}</div>
          <div>Total Heat: ${d.total_heat}</div>
          <div>1D Heat: ${d.heat_1d}</div>
          <div>3D Heat: ${d.heat_3d}</div>
          <div>7D Heat: ${d.heat_7d}</div>
          <div>Age Penalty: ${d.age_penalty}</div>
        </div>
      `;
            },
          },
          grid: { left: "3%", right: "4%", bottom: "3%", containLabel: true },
          xAxis: {
            type: "value",
            name: "Total Heat",
            nameTextStyle: { color: "#64748b" },
          },
          yAxis: {
            type: "category",
            data: names,
            axisLabel: { color: "#334155" },
            // 核心：true = 反转Y轴，第一条数据显示在最顶部
            inverse: true,
          },
          series: [
            {
              name: "Total Heat",
              type: "bar",
              barWidth: "60%",
              data: totalHeat,
              itemStyle: {
                color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [
                  { offset: 0, color: "#f59e0b" },
                  { offset: 1, color: "#ef4444" },
                ]),
              },
            },
          ],
        };
        chart.setOption(option);
        window.addEventListener("resize", () => chart.resize());
        return chart;
      }
      async function loadData() {
        try {
          // Load daily status files
          const [sciToday, sciPrev, genToday, genPrev] = await Promise.all([
            fetch(`./status/science_${todayDate}.json`),
            fetch(`./status/science_${prevDate}.json`),
            fetch(`./status/general_${todayDate}.json`),
            fetch(`./status/general_${prevDate}.json`),
          ]);

          projectData = (await sciToday.json()) || [];
          prevProjectData = (await sciPrev.json()) || [];
          generalData = (await genToday.json()) || [];
          prevGeneralData = (await genPrev.json()) || [];

          // Load heat score files
          const [sciHeatRes, genHeatRes] = await Promise.all([
            fetch(`./scores/science_heat.json`),
            fetch(`./scores/general_heat.json`),
          ]);
          scienceHeatData = (await sciHeatRes.json()) || [];
          generalHeatData = (await genHeatRes.json()) || [];

          const dailyChangeData = buildDiffList(projectData, prevProjectData);
          const generalChangeData = buildDiffList(generalData, prevGeneralData);

          renderPage(dailyChangeData, generalChangeData);

          // Render heat bar charts
          scienceChart = initHeatHorizontalBarChart(
            "scienceChart",
            "🔬 Science Project Heat Ranking",
            scienceHeatData,
          );
          generalChart = initHeatHorizontalBarChart(
            "generalChart",
            "📦 General Project Heat Ranking",
            generalHeatData,
          );
        } catch (err) {
          document.getElementById("app").innerHTML = `
          <div class="hero">
            <h1>⚠️ Data Load Failed</h1>
            <h3>Please check files in /status/ and /scores/ directory</h3>
            <p style="margin-top:20px;color:#dc2626">${err.message}</p>
          </div>
        `;
          console.error(err);
        }
      }

      function renderTable(id, title, data, isDaily = false) {
        const formatNum = (n) => Number(n || 0).toLocaleString();
        const cardClass = isDaily ? "card card-daily" : "card";
        const tableClass = isDaily ? "table-daily" : "";
        const wrapperClass = isDaily
          ? "table-wrapper table-wrapper-daily"
          : "table-wrapper";

        let html = `
      <div class="${cardClass}">
        <h2>${title}</h2>
        <div class="${wrapperClass}">
          <table id="${id}" class="${tableClass}">
            <thead>
              <tr>
                <th>Project</th><th>Developer</th><th class="num-col">Stars</th>
                <th class="num-col">Forks</th><th class="num-col">Watching</th>
                <th class="num-col">Open Issues</th><th class="num-col">Closed Issues</th>
                <th class="num-col">Open Pulls</th><th class="num-col">Closed Pulls</th>
                <th class="num-col">Contributors</th><th class="num-col">Commits</th>
                <th>Last Commit</th><th>Last Fork</th><th>Last Open Issue</th>
                <th>Last Closed Issue</th><th>Last Open Pull</th><th>Last Closed Pull</th>
              </tr>
            </thead><tbody>`;

        if (!data || !data.length) {
          html += `<tr><td colspan="17" style="text-align:center;padding:30px;">No Data Available</td></tr>`;
          return html + `</tbody></table></div></div>`;
        }

        data.forEach((item) => {
          if (!item?.name) return;
          const [dev, proj] = item.name.split("/") || ["-", item.name];
          const cells = {
            stars: isDaily
              ? formatDailyChange(item.stars)
              : formatNum(item.stars),
            forks: isDaily
              ? formatDailyChange(item.forks)
              : formatNum(item.forks),
            watching: isDaily
              ? formatDailyChange(item.watching)
              : formatNum(item.watching),
            openIssues: isDaily
              ? formatDailyChange(item.open_issues)
              : formatNum(item.open_issues),
            closedIssues: isDaily
              ? formatDailyChange(item.closed_issues)
              : formatNum(item.closed_issues),
            openPrs: isDaily
              ? formatDailyChange(item.open_prs)
              : formatNum(item.open_prs),
            closedPrs: isDaily
              ? formatDailyChange(item.closed_prs)
              : formatNum(item.closed_prs),
            contributors: isDaily
              ? formatDailyChange(item.contributors)
              : formatNum(item.contributors),
            commits: isDaily
              ? formatDailyChange(item.commits)
              : formatNum(item.commits),
          };
          html += `<tr>
          <td><a href="${item.url || "#"}" target="_blank">${proj}</a></td>
          <td title="${dev}">${dev}</td>
          <td class="num">${cells.stars}</td>
          <td class="num">${cells.forks}</td>
          <td class="num">${cells.watching}</td>
          <td class="num">${cells.openIssues}</td>
          <td class="num">${cells.closedIssues}</td>
          <td class="num">${cells.openPrs}</td>
          <td class="num">${cells.closedPrs}</td>
          <td class="num">${cells.contributors}</td>
          <td class="num">${cells.commits}</td>
          <td>${formatDate(item.last_commit)}</td>
          <td>${formatDate(item.last_fork)}</td>
          <td>${formatDate(item.last_open_issue)}</td>
          <td>${formatDate(item.last_closed_issue)}</td>
          <td>${formatDate(item.last_open_pr)}</td>
          <td>${formatDate(item.last_closed_pr)}</td>
        </tr>`;
        });
        return html + `</tbody></table></div></div>`;
      }

      function makeTableSortable(tableId) {
        const table = document.getElementById(tableId);
        if (!table) return;
        const headers = table.querySelectorAll("th");
        const numColumns = [2, 3, 4, 5, 6, 7, 8, 9, 10];
        const dateColumns = [11, 12, 13, 14, 15, 16];
        headers.forEach((th, idx) => {
          let sortOrder = 1;
          th.addEventListener("click", () => {
            const rows = Array.from(table.querySelectorAll("tbody tr"));
            rows.sort((a, b) => {
              if (dateColumns.includes(idx)) {
                let da = new Date(a.cells[idx].textContent);
                let db = new Date(b.cells[idx].textContent);
                return (db - da) * sortOrder;
              }
              let aTxt = a.cells[idx].textContent.replace(/[,^\d-]/g, "");
              let bTxt = b.cells[idx].textContent.replace(/[,^\d-]/g, "");
              if (numColumns.includes(idx)) {
                let an = parseFloat(aTxt) || 0;
                let bn = parseFloat(bTxt) || 0;
                return (an - bn) * sortOrder;
              }
              return aTxt.localeCompare(bTxt) * sortOrder;
            });
            const tbody = table.querySelector("tbody");
            rows.forEach((r) => tbody.appendChild(r));
            sortOrder *= -1;
          });
        });
      }

      function getTopGainers(data) {
        if (!data || !data.length)
          return {
            starGainer: "None",
            forkGainer: "None",
            watchGainer: "None",
            fixedIssues: "None",
            contributorGainer: "None",
          };
        return {
          starGainer:
            [...data]
              .sort((a, b) => b.stars - a.stars)[0]
              ?.name.split("/")[1] || "None",
          forkGainer:
            [...data]
              .sort((a, b) => b.forks - a.forks)[0]
              ?.name.split("/")[1] || "None",
          watchGainer:
            [...data]
              .sort((a, b) => b.watching - a.watching)[0]
              ?.name.split("/")[1] || "None",
          fixedIssues:
            [...data]
              .sort((a, b) => b.closed_issues - a.closed_issues)[0]
              ?.name.split("/")[1] || "None",
          contributorGainer:
            [...data]
              .sort((a, b) => b.contributors - a.contributors)[0]
              ?.name.split("/")[1] || "None",
        };
      }

      function renderPage(dailyChangeData, generalChangeData) {
        const app = document.getElementById("app");
        const totalProjects =
          (projectData?.length || 0) + (generalData?.length || 0);
        const dailyStats = getTopGainers(dailyChangeData);
        const generalDailyStats = getTopGainers(generalChangeData);

        app.innerHTML = `
        <div class="hero">
          <h1>🏛️</h1>
          <h1><strong>Pantheon</strong></h1>
          <h2>Automated Research</h2>
          <h3>Unlock the Path, Lead the Way</h3>
          <div class="stats-row">
            <div class="stat-item">Known Projects: <span>${totalProjects}</span></div>
            <button class="add-more-btn" onclick="window.open('${addMoreUrl}','_blank')">Add more</button>
          </div>
          <div class="hero-stats-info" style="margin-top:20px;font-size:15px">
            <b>Science Daily:</b>
            Stars: <b style="color:#059669">${dailyStats.starGainer}</b> |
            Forks: <b style="color:#059669">${dailyStats.forkGainer}</b> |
            Watching: <b style="color:#059669">${dailyStats.watchGainer}</b> |
            Fixed: <b style="color:#059669">${dailyStats.fixedIssues}</b> |
            Contributors: <b style="color:#059669">${dailyStats.contributorGainer}</b>
          </div>
          <div class="hero-stats-info" style="margin-top:10px;font-size:15px">
            <b>General Daily:</b>
            Stars: <b style="color:#059669">${generalDailyStats.starGainer}</b> |
            Forks: <b style="color:#059669">${generalDailyStats.forkGainer}</b> |
            Watching: <b style="color:#059669">${generalDailyStats.watchGainer}</b> |
            Fixed: <b style="color:#059669">${generalDailyStats.fixedIssues}</b> |
            Contributors: <b style="color:#059669">${generalDailyStats.contributorGainer}</b>
          </div>
        </div>

        <div class="chart-row">
          <div class="chart-card"><div id="scienceChart" class="chart-box"></div></div>
          <div class="chart-card"><div id="generalChart" class="chart-box"></div></div>
        </div>

        <div class="section">${renderTable("dailyTable", "📈 Science - Daily Dashboard", dailyChangeData, true)}</div>
        <div class="section">${renderTable("generalDailyTable", "📊 General - Daily Dashboard", generalChangeData, true)}</div>

        <div class="section">

When chaos first gave way to hidden truths profound,
Mortal seekers wandered lost, with no clear way bound.
No need to toil through volumes thousand-fold,
For wit unbodied breaks the darkness cold.
Since ancient times, all who sought wisdom's gate,
Faced mountains of texts, vast seas of reason,
Trials of experiment, strokes of fate,

Without form or voice, yet with logic refined.

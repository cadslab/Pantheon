name: Update Pantheon Stats
on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 0点运行
  workflow_dispatch: # 允许手动触发
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许读写仓库内容
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PANTHEON_TOKEN }} # 显式指定Token检出
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9" # 与原脚本依赖的Python版本一致
      - name: Install Dependencies
        run: pip install requests # 仅需requests，与脚本依赖一致
      - name: Run Script
        env:
          PANTHEON_TOKEN: ${{ secrets.PANTHEON_TOKEN }} # 传递Token给脚本
        run: python fetch_stats.py # 注意：改为批量脚本文件名
      - name: Commit and Push Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # 核心修复：1. 检测status文件夹下所有json 2. 用--分隔路径避免歧义 3. 兼容文件夹不存在
          if [ -d "status" ] && ! git diff --quiet HEAD -- status/*.json; then
            echo "Detected changes in status stats files, start commit"
            git add status/*.json # 添加status下所有变更的统计json
            git commit -m "chore: auto update pantheon stats data [ci skip]" --no-verify
            git push origin main # 分支为master则改为master
          else
            echo "No changes in status stats files or status folder not exist, skip commit"
          fi

name: Update Pantheon Stats
on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Configure Git Global Credential
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.PANTHEON_TOKEN }}@github.com" >> ~/.git-credentials
          chmod 600 ~/.git-credentials

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python Dependencies
        run: pip install requests tenacity python-dateutil

      - name: Run stats scripts
        env:
          PANTHEON_TOKEN: ${{ secrets.PANTHEON_TOKEN }}
        run: |
          python fetch_stats.py
          python score.py

      - name: Commit & Push updated stats data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          if [ -d "status" ]; then
            # 重点修改：追踪status目录全部变更（包含删除的文件）
            git add --update status/
            # 查看所有变更
            git status
            # 判断是否存在变更
            if [[ -n $(git status --porcelain status/) ]]; then
              git commit -m "chore: auto update pantheon stats data [ci skip]" --no-verify
              git push origin main
            else
              echo "No changes detected, skip commit"
            fi
          fi

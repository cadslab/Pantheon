name: Update Pantheon Stats
on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Configure Git Global Credential
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.PANTHEON_TOKEN }}@github.com" >> ~/.git-credentials
          chmod 600 ~/.git-credentials

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Python Dependencies
        run: pip install requests tenacity python-dateutil

      - name: Run stats scripts
        env:
          PANTHEON_TOKEN: ${{ secrets.PANTHEON_TOKEN }}
        run: |
          python fetch_stats.py
          python score.py

      - name: Commit & Push updated stats data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add --update status/ scores/ birth/
          git add status/ scores/ birth/
          git status

          if [[ -n $(git status --porcelain status/ scores/ birth/) ]]; then
            git commit -m "chore: auto update pantheon stats data [ci skip]" --no-verify
            git push origin main
          else
            echo "No changes detected, skip commit"
          fi

      - name: Delete workflow runs older than 7 days
        env:
          GH_TOKEN: ${{ secrets.PANTHEON_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          python << 'EOF'
          import requests
          from datetime import datetime, timedelta, timezone
          import os

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GH_REPO"]
          # 使用带UTC时区的当前时间
          cutoff = datetime.now(timezone.utc) - timedelta(days=7)
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}

          page = 1
          deleted = 0
          while True:
              url = f"https://api.github.com/repos/{repo}/actions/runs?per_page=100&page={page}"
              resp = requests.get(url, headers=headers)
              resp.raise_for_status()
              runs = resp.json()["workflow_runs"]
              if not runs:
                  break

              for run in runs:
                  created_str = run["created_at"]
                  created_dt = datetime.fromisoformat(created_str.replace("Z", "+00:00"))
                  if created_dt < cutoff:
                      run_id = run["id"]
                      del_url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}"
                      del_resp = requests.delete(del_url, headers=headers)
                      if del_resp.status_code == 204:
                          deleted += 1
                          print(f"Deleted run {run_id} created at {created_str}")
                      else:
                          print(f"Failed delete {run_id}, status: {del_resp.status_code}")
              page += 1
          print(f"Total deleted runs: {deleted}")
          EOF

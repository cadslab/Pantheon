name: 自动更新仓库数据
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 0点（北京时间8点）运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install requests

      - name: 抓取数据
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/fetch-repo-data.py

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/repo-data.json
          git commit -m "📊 更新仓库数据" || exit 0
          git push
